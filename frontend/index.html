<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argument Decomposer</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <header>
            <h1>Argument Decomposer</h1>
            <p class="subtitle">Analyze ethical dilemmas from four distinct analytical perspectives</p>
        </header>

        <div class="input-section">
            <form id="questionForm">
                <div class="input-group">
                    <label for="questionInput">Enter your ethical question:</label>
                    <textarea 
                        id="questionInput" 
                        name="question" 
                        placeholder="e.g., Should autonomous vehicles prioritize passenger safety over pedestrian safety?"
                        rows="3"
                        required
                    ></textarea>
                </div>
                <button type="submit" id="submitBtn">Analyze</button>
            </form>
        </div>

        <div id="loadingIndicator" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Analyzing...</p>
        </div>

        <div id="errorMessage" class="error" style="display: none;"></div>

        <div id="resultsContainer" class="results-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
